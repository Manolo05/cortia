<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CortIA</title>
  <style>
    body {
      width: 300px;
      min-height: 200px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      font-size: 20px;
      font-weight: bold;
    }
    .content {
      padding: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      margin-bottom: 8px;
      text-decoration: none;
    }
    .btn:hover { background: #1d4ed8; }
    .btn-secondary {
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🏠</span>
    <div class="logo">CortIA</div>
  </div>
  
  <div class="content">
    <button class="btn" id="open-panel">
      Ouvrir le panneau CortIA
    </button>
    <a class="btn btn-secondary" href="https://cortia.vercel.app" target="_blank">
      Accéder à l'application
    </a>
    <p class="status" id="status">Prêt</p>
  </div>

  <script>
    document.getElementById('open-panel').addEventListener('click', async () => {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true })
      await chrome.sidePanel.open({ tabId: tab.id })
      window.close()
    })
  </script>
</body>
</html>
